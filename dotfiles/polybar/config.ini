[colors]
background = #0a0a0a
foreground = #d4af37
module-bg = #333333

[bar/icarus]
width = 100%
height = 24
background = ${colors.background}
foreground = ${colors.foreground}

modules-left = i3
modules-center = date
modules-right = cpu memory

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%: %name%
label-focused-background = ${colors.foreground}
label-focused-foreground = ${colors.background}
label-unfocused = %index%
label-visible = %index%
label-urgent = %index%!
label-separator = " "

[module/date]
type = internal/date
date = %H:%M
label = %date%

[module/cpu]
type = internal/cpu
interval = 2
format = <label> <ramp-coreload>
label = CPU

[module/memory]
type = internal/memory
interval = 2
format = <label> <bar-used>
label = RAM
bar-used-width = 10
bar-used-indicator = |
bar-used-fill = |
bar-used-empty = |