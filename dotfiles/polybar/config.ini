[colors]
background = #0a0a0a
foreground = #d4af37
module-bg = #1a1a1a

[bar/icarus]
width = 100%
height = 28
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
line-color = #ff0000

modules-left = i3
modules-center = xwindow
modules-right = cpu memory filesystem date powermenu

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%: %name%
label-focused-background = ${colors.foreground}
label-focused-foreground = ${colors.background}
label-unfocused = %index%
label-visible = %index%
label-urgent = %index%!
label-separator = " "



[module/cpu]
type = internal/cpu
interval = 2
format = <label> <ramp-coreload>
label = CPU
ramp-coreload-0 = 0
ramp-coreload-1 = 1
ramp-coreload-2 = 2
ramp-coreload-3 = 3
ramp-coreload-4 = 4
ramp-coreload-5 = 5
ramp-coreload-6 = 6
ramp-coreload-7 = 7
ramp-coreload-spacing = 0

[module/memory]
type = internal/memory
interval = 2
format = <label> <bar-used>
label = RAM
bar-used-width = 20
bar-used-indicator = |
bar-used-fill = -
bar-used-empty = -
bar-used-foreground-0 = #d4af37
bar-used-foreground-1 = #ffaa00
bar-used-foreground-2 = #ff5500
bar-used-foreground-3 = #ff0000

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
format-mounted = <label> <bar-used>
label = DISK
bar-used-width = 15
bar-used-indicator = |
bar-used-fill = -
bar-used-empty = -

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
label = %date%

[module/powermenu]
type = custom/text
content = OFF
click-left = i3-nagbar -t warning -m 'Shut down?' -b 'Yes' 'systemctl poweroff'