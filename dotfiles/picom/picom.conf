# Icarus picom – experimental backends for blur
backend = "glx";
vsync = true;

blur:
{
  method = "dual_kawase";
  strength = 8;
  size = 4;
  deviation = 1.0;
  background = true;
  background-frame = true;
  background-fixed = true;
};

shadow = false;
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];