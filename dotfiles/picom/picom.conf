# Icarus Picom - Dual Kawase blur, rounded corners.
backend = "glx";
vsync = true;

blur: {
  method = "dual_kawase";
  strength = 9;
  size = 5;
  deviation = 1.2;
  background = true;
  background-frame = true;
  background-fixed = true;
  kern = "3x3box";
};

shadow = true;
shadow-radius = 15;
shadow-opacity = 0.6;
shadow-offset-x = -10;
shadow-offset-y = -8;
shadow-color = "#000000";

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 4;

corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

opacity-rule = [
  "90:class_g = 'Alacritty'",
  "85:class_g = 'firefox'",
  "80:class_g = 'code-oss'"
];

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.9; };
};